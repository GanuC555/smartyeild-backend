version: '3.8'
services:
  mongodb:
    image: mongo:7
    container_name: smartyield-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smartyield

  redis:
    image: redis:7-alpine
    container_name: smartyield-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  mongo_data:
  redis_data:
